proxy-providers-anchor:
  PProviders: &PProviders {proxy: DIRECT, type: http, interval: 86400, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}}
# 必须填入订阅链接
proxy-providers:
  主力提供商:
    <<: *PProviders
    url: "主力提供商-订阅链接"
    path: ./proxies/Airport1.yaml
  备用提供商:
    <<: *PProviders
    url: "备用提供商-订阅链接"
    path: ./proxies/Airport2.yaml
mode: rule
mixed-port: 7890
tproxy-port: 7891
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: silent
find-process-mode: "off"
# 必须修改mixed鉴权
authentication:
  - "user:password"
skip-auth-prefixes:
  - 127.0.0.1/8
profile:
  store-selected: true
external-controller: 0.0.0.0:9090
# 必须修改api外部控制鉴权
secret: "password"
sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80]
    TLS:
      ports: [443]
    QUIC:
      ports: [443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: redir-host
  default-nameserver:
    - tls://223.5.5.5
    - tls://1.12.12.12
  proxy-server-nameserver:
    - tls://223.5.5.5
    - tls://1.12.12.12
  nameserver:
    - https://8.8.8.8/dns-query#DNS代理
    - https://94.140.14.140/dns-query#DNS代理
  direct-nameserver:
    - tls://223.5.5.5
    - tls://1.12.12.12
  nameserver-policy:
    "+.googleapis.cn":
    - https://8.8.8.8/dns-query#DNS代理
    - https://94.140.14.140/dns-query#DNS代理
    "rule-set:steam@cn_domain,games-cn_domain,game-platforms-download_domain,apple_domain,win-update_domain,microsoft@cn_domain,cn_domain,custom_direct_class":
    - tls://223.5.5.5
    - tls://1.12.12.12
proxy-groups-anchor:
  gwpr: &gwpr {type: select, proxies: [香港, 台湾, 新加坡, 日本, 美国, 冷门地区, 直连]}
  gnpr: &gnpr {type: select, proxies: [直连, 香港, 台湾, 新加坡, 日本, 美国, 冷门地区]}
  slgp: &slgp {type: select}
  atgp: &atgp {type: url-test, url: "https://www.gstatic.com/generate_204", interval: 300, tolerance: 30}
  fbgp: &fbgp {type: fallback, url: "https://www.gstatic.com/generate_204", interval: 300}
proxy-groups:
  - {name: 国内, <<: *gnpr}
  - {name: 电报, <<: *gwpr}
  - {name: 社媒, <<: *gwpr}
  - {name: AI, <<: *gwpr}
  - {name: 油管, <<: *gwpr}
  - {name: 谷歌, <<: *gwpr}
  - {name: 游戏, <<: *gwpr}
  - {name: 特殊, <<: *gwpr}
  - {name: 娱乐, <<: *gwpr}
  - {name: 涩涩, <<: *gwpr}
  - {name: 代理, <<: *gwpr}
  - {name: 兜底, <<: *gwpr}
  - {name: DNS代理, <<: *gwpr}
  - {name: 香港, <<: *fbgp, proxies: [香港-首选, 香港-主力, 香港-备用]}
  - {name: 台湾, <<: *fbgp, proxies: [台湾-首选, 台湾-主力, 台湾-备用]}
  - {name: 新加坡, <<: *fbgp, proxies: [新加坡-首选, 新加坡-主力, 新加坡-备用]}
  - {name: 日本, <<: *fbgp, proxies: [日本-首选, 日本-主力, 日本-备用]}
  - {name: 美国, <<: *fbgp, proxies: [美国-首选, 美国-主力, 美国-备用]}
  - {name: 香港-首选, <<: *slgp, use: [主力提供商, 备用提供商], filter: "(?i)香港"}
  - {name: 台湾-首选, <<: *slgp, use: [主力提供商, 备用提供商], filter: "(?i)台湾"}
  - {name: 新加坡-首选, <<: *slgp, use: [主力提供商, 备用提供商], filter: "(?i)新加坡"}
  - {name: 日本-首选, <<: *slgp, use: [主力提供商, 备用提供商], filter: "(?i)日本"}
  - {name: 美国-首选, <<: *slgp, use: [主力提供商, 备用提供商], filter: "(?i)美国"}
  - {name: 香港-主力, <<: *atgp, use: [主力提供商], filter: "(?i)香港"}
  - {name: 台湾-主力, <<: *atgp, use: [主力提供商], filter: "(?i)台湾"}
  - {name: 新加坡-主力, <<: *atgp, use: [主力提供商], filter: "(?i)新加坡"}
  - {name: 日本-主力, <<: *atgp, use: [主力提供商], filter: "(?i)日本"}
  - {name: 美国-主力, <<: *atgp, use: [主力提供商], filter: "(?i)美国"}
  - {name: 香港-备用, <<: *atgp, use: [备用提供商], filter: "(?i)香港"}
  - {name: 台湾-备用, <<: *atgp, use: [备用提供商], filter: "(?i)台湾"}
  - {name: 新加坡-备用, <<: *atgp, use: [备用提供商], filter: "(?i)新加坡"}
  - {name: 日本-备用, <<: *atgp, use: [备用提供商], filter: "(?i)日本"}
  - {name: 美国-备用, <<: *atgp, use: [备用提供商], filter: "(?i)美国"}
  - {name: 冷门地区, <<: *slgp, use: [主力提供商, 备用提供商], exclude-filter: "(?i)香港|台湾|新加坡|日本|美国"}
  - {name: 直连, <<: *slgp, proxies: [DIRECT], url: "https://wifi.vivo.com.cn/generate_204", interval: 300}
rules:
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip)))))),REJECT
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,custom_direct_class,国内
  - RULE-SET,custom_proxy_dns_class,DNS代理
  - RULE-SET,custom_proxy_class,代理
  - RULE-SET,steam@cn_domain,国内
  - RULE-SET,games-cn_domain,国内
  - RULE-SET,game-platforms-download_domain,国内
  - RULE-SET,apple_domain,国内
  - RULE-SET,win-update_domain,国内
  - RULE-SET,microsoft@cn_domain,国内
  - RULE-SET,telegram_domain,电报
  - RULE-SET,telegram_ip,电报
  - RULE-SET,social-media-!cn_domain,社媒
  - RULE-SET,ai-!cn_domain,AI
  - RULE-SET,youtube_domain,油管
  - RULE-SET,google_domain,谷歌
  - RULE-SET,games-!cn_domain,游戏
  - DOMAIN-KEYWORD,sankaku,特殊
  - RULE-SET,mega_domain,特殊
  - RULE-SET,ehentai_domain,特殊
  - DOMAIN-KEYWORD,iwara,娱乐
  - DOMAIN-KEYWORD,emby,娱乐
  - RULE-SET,porn_domain,涩涩
  - RULE-SET,gfw_domain,代理
  - RULE-SET,cn_domain,国内
  - RULE-SET,cn_ip,国内
  - MATCH,兜底
